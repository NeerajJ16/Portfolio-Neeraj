      <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f19;
      --surface: #131722;
      --border: rgba(255,255,255,0.07);
      --acc1: #f95230;
      --acc2: #fb2c02;
      --fg: #e7ecf2;
      --muted: #9aa4b2;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ---- Animated background orbs ---- */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 520px; height: 520px; background: #fb2c02; top: -180px; left: -120px; animation-duration: 16s; }
    .orb2 { width: 400px; height: 400px; background: #f95230; bottom: -150px; right: -100px; animation-duration: 20s; animation-delay: -5s; }
    .orb3 { width: 260px; height: 260px; background: #ff8060; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 12s; animation-delay: -3s; opacity: 0.07; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }
    .orb3 { animation-name: drift3; }
    @keyframes drift3 {
      from { transform: translate(-50%,-50%) scale(1); }
      to   { transform: translate(calc(-50% + 20px), calc(-50% + 15px)) scale(1.12); }
    }

    /* ---- Grid pattern overlay ---- */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      z-index: 0;
      pointer-events: none;
    }

    /* ---- Main card ---- */
    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 52px 48px;
      max-width: 600px;
      width: calc(100% - 32px);
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Logo ---- */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }
    .logo-wrap img {
      height: 44px;
      width: auto;
    }

    /* ---- Gear icon animation ---- */
    .icon-wrap {
      width: 80px; height: 80px;
      margin: 0 auto 28px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .gear-ring {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--acc1);
      border-right-color: var(--acc1);
      animation: spin 2.4s linear infinite;
    }
    .gear-ring-inner {
      position: absolute;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: rgba(249,82,48,0.4);
      border-left-color: rgba(249,82,48,0.4);
      animation: spin 1.6s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gear-icon {
      font-size: 24px;
      animation: spin 6s linear infinite;
      display: inline-block;
    }

    /* ---- Text ---- */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(251,44,2,0.18), rgba(249,82,48,0.12));
      color: var(--acc1);
      border: 1px solid rgba(249,82,48,0.3);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(30px, 6vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #e7ecf2 0%, #9aa4b2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 span {
      background: linear-gradient(135deg, var(--acc2), var(--acc1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 440px;
      margin-left: auto; margin-right: auto;
    }

    /* ---- Divider ---- */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    /* ---- Contact row ---- */
    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .contact-row a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: color 0.2s;
    }
    .contact-row a:hover { color: var(--acc1); }
    .contact-row a svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ---- Social row ---- */
    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .social-row a {
      display: grid;
      place-items: center;
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .social-row a:hover {
      border-color: rgba(249,82,48,0.5);
      background: rgba(249,82,48,0.08);
      color: var(--acc1);
    }
    .social-row a svg { width: 17px; height: 17px; }

    /* ---- Footer note ---- */
    .footer-note {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(154,164,178,0.5);
      white-space: nowrap;
      z-index: 1;
    }

    /* ---- Progress bar (decorative) ---- */
    .progress-wrap {
      margin-bottom: 32px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(154,164,178,0.6);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--acc2), var(--acc1));
      border-radius: 99px;
      animation: fillBar 2.4s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards;
    }
    @keyframes fillBar {
      to { width: 72%; }
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
